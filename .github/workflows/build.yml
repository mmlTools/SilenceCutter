name: Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_VERSION: 0.1.0

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact: SilenceCutter-windows-x64
          - os: macos-latest
            runtime: osx-x64
            artifact: SilenceCutter-macos-x64
          - os: ubuntu-latest
            runtime: linux-x64
            artifact: SilenceCutter-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Set package metadata
        id: package_metadata
        shell: pwsh
        run: |
          $version = "${{ env.APP_VERSION }}"
          if ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          } elseif ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "app_version=$version" >> $env:GITHUB_OUTPUT
          "release_prefix=SilenceCutter-$version" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.package_metadata.outputs.app_version }}

      - name: Publish
        run: dotnet publish SilenceCutter.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true -p:Version=${{ steps.package_metadata.outputs.app_version }} --output artifacts/${{ matrix.artifact }}

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.artifact }}/* -DestinationPath artifacts/${{ steps.package_metadata.outputs.release_prefix }}-${{ matrix.runtime }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_metadata.outputs.release_prefix }}-${{ matrix.runtime }}
          path: artifacts/${{ steps.package_metadata.outputs.release_prefix }}-${{ matrix.runtime }}.zip

  release:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*.zip
