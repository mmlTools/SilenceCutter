name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-main
  cancel-in-progress: false

jobs:
  build-release:
    name: Build, Package, and Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Show .NET SDK
        run: dotnet --info

      - name: Resolve next release version
        id: version
        shell: pwsh
        run: |
          git fetch --tags --force

          $latestTag = git tag --list "v[0-9]*.[0-9]*.[0-9]*" |
            ForEach-Object {
              if ($_ -match '^v(?<version>\d+\.\d+\.\d+)$') {
                [pscustomobject]@{
                  Tag = $_
                  Version = [version]$Matches.version
                }
              }
            } |
            Sort-Object Version -Descending |
            Select-Object -First 1

          if ($latestTag) {
            $baseVersion = $latestTag.Version
          } else {
            $baseVersion = [version]"0.1.0"
          }

          $nextVersion = [version]::new($baseVersion.Major, $baseVersion.Minor, $baseVersion.Build + 1)
          $tag = "v$nextVersion"
          $semver = "$nextVersion"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "semver=$semver" >> $env:GITHUB_OUTPUT
          Write-Host "Next release tag: $tag"

      - name: Restore
        run: dotnet restore SilenceCutter.sln

      - name: Build
        run: dotnet build SilenceCutter.sln --configuration Release --no-restore /p:Version=${{ steps.version.outputs.semver }}

      - name: Publish Windows x64
        run: dotnet publish SilenceCutter.csproj --configuration Release --runtime win-x64 --self-contained true --output artifacts/win-x64 /p:Version=${{ steps.version.outputs.semver }}

      - name: Package Windows x64
        shell: pwsh
        run: Compress-Archive -Path artifacts/win-x64/* -DestinationPath SilenceCutter-${{ steps.version.outputs.tag }}-win-x64.zip -Force

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TAG: ${{ steps.version.outputs.tag }}
          SEMVER: ${{ steps.version.outputs.semver }}
          SHA: ${{ github.sha }}
          ZIP_PATH: SilenceCutter-${{ steps.version.outputs.tag }}-win-x64.zip
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releaseBody = @{
            tag_name = $env:TAG
            target_commitish = $env:SHA
            name = "Silence Cutter $env:TAG"
            body = "Automated Silence Cutter build for $env:TAG."
            draft = $false
            prerelease = $false
            generate_release_notes = $true
          } | ConvertTo-Json

          $release = Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/$env:OWNER/$env:REPO/releases" `
            -Headers $headers `
            -ContentType "application/json" `
            -Body $releaseBody

          $uploadHeaders = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Content-Type" = "application/zip"
          }

          $uploadUri = "https://uploads.github.com/repos/$env:OWNER/$env:REPO/releases/$($release.id)/assets?name=$env:ZIP_PATH"
          Invoke-RestMethod `
            -Method Post `
            -Uri $uploadUri `
            -Headers $uploadHeaders `
            -InFile $env:ZIP_PATH
