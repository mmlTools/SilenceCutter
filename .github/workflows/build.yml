name: Auto Build Release

on:
  push:
    branches:
      - main

run-name: Auto release from ${{ github.ref_name }} at ${{ github.sha }}

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_VERSION: 0.1.0

jobs:
  trigger_check:
    name: Trigger check
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"

  version:
    name: Prepare version
    needs: trigger_check
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.next_version.outputs.app_version }}
      release_tag: ${{ steps.next_version.outputs.release_tag }}
      release_prefix: ${{ steps.next_version.outputs.release_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next patch version
        id: next_version
        shell: pwsh
        run: |
          git fetch --tags --force

          $baseVersion = [version]"${{ env.APP_VERSION }}"
          $latestTag = git tag --list "v[0-9]*.[0-9]*.[0-9]*" |
            ForEach-Object {
              if ($_ -match '^v(?<version>\d+\.\d+\.\d+)$') {
                [pscustomobject]@{
                  Tag = $_
                  Version = [version]$Matches.version
                }
              }
            } |
            Sort-Object Version -Descending |
            Select-Object -First 1

          if ($latestTag) {
            $baseVersion = $latestTag.Version
          }

          $nextVersion = [version]::new($baseVersion.Major, $baseVersion.Minor, $baseVersion.Build + 1)
          $releaseTag = "v$nextVersion"
          $releasePrefix = "SilenceCutter-$nextVersion"

          "app_version=$nextVersion" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_prefix=$releasePrefix" >> $env:GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.os }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact: SilenceCutter-windows-x64
          - os: macos-latest
            runtime: osx-x64
            artifact: SilenceCutter-macos-x64
          - os: ubuntu-latest
            runtime: linux-x64
            artifact: SilenceCutter-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ needs.version.outputs.app_version }}

      - name: Publish
        run: dotnet publish SilenceCutter.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true -p:Version=${{ needs.version.outputs.app_version }} --output artifacts/${{ matrix.artifact }}

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.artifact }}/* -DestinationPath artifacts/${{ needs.version.outputs.release_prefix }}-${{ matrix.runtime }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.version.outputs.release_prefix }}-${{ matrix.runtime }}
          path: artifacts/${{ needs.version.outputs.release_prefix }}-${{ matrix.runtime }}.zip

  release:
    name: Create tag and release
    needs:
      - version
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create and push tag
        shell: pwsh
        run: |
          git fetch --tags --force
          $tag = "${{ needs.version.outputs.release_tag }}"
          if (git rev-parse $tag 2>$null) {
            throw "Tag $tag already exists. Push again after the next version is available."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $tag -m "Release $tag"
          git push origin $tag

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          name: Silence Cutter ${{ needs.version.outputs.app_version }}
          generate_release_notes: true
          files: release-assets/*.zip
